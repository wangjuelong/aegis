syntax = "proto3";

package aegis.agent.v1;

service AgentService {
  rpc EventStream(stream UplinkMessage) returns (stream DownlinkMessage);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc UploadArtifact(stream ArtifactChunk) returns (UploadResult);
  rpc PullUpdate(UpdateRequest) returns (stream UpdateChunk);
}

message UplinkMessage {
  oneof payload {
    EventBatch event_batch = 1;
    ClientAck client_ack = 2;
    FlowControlHint flow_control_hint = 3;
  }
}

message DownlinkMessage {
  oneof payload {
    SignedServerCommand command = 1;
    BatchAck batch_ack = 2;
    FlowControlHint flow_control_hint = 3;
  }
}

message EventBatch {
  repeated bytes events = 1;
}

message ClientAck {
  uint64 sequence_id = 1;
}

message BatchAck {
  uint64 sequence_id = 1;
}

message FlowControlHint {
  uint32 queue_depth = 1;
}

message SignedServerCommand {
  bytes payload = 1;
  bytes signature = 2;
  string signing_key_id = 3;
}

message HeartbeatRequest {
  string agent_id = 1;
  bytes health_json = 2;
}

message HeartbeatResponse {
  bool accepted = 1;
}

message ArtifactChunk {
  string artifact_id = 1;
  bytes chunk = 2;
}

message UploadResult {
  bool complete = 1;
}

message UpdateRequest {
  string agent_version = 1;
}

message UpdateChunk {
  bytes chunk = 1;
}

